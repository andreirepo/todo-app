name: Deploy Todo App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_FRONTEND: ${{ github.repository }}/todo-frontend
  IMAGE_NAME_BACKEND: ${{ github.repository }}/todo-backend

jobs:
  build-and-test:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install

      - name: Run linting (if available)
        run: yarn lint || echo "No lint script found"

  build-and-push:
    needs: build-and-test
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./app/client/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            API_URL=/apps/todo/api
            BASE_URL=/apps/todo/
            NODE_ENV=production

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./app/server/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [build-and-test, build-and-push]
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Backup current deployment
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} \
            "cd /home/${{ env.SERVER_USER }}/apps/todo-app && \
             docker-compose -f docker-compose.yml ps --format json > /tmp/todo-backup-state.json 2>/dev/null || true"

      - name: Deploy to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} \
            "sudo mkdir -p /home/${{ env.SERVER_USER }}/apps/todo-app && \
             sudo chown ${{ env.SERVER_USER }}:${{ env.SERVER_USER }} /home/${{ env.SERVER_USER }}/apps/todo-app && \
             sudo chmod 755 /home/${{ env.SERVER_USER }}/apps/todo-app"

          rsync -az --delete -e "ssh" --exclude='acme/' . \
            ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:/home/${{ env.SERVER_USER }}/apps/todo-app/

          ssh ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} <<EOF
            cd /home/${{ env.SERVER_USER }}/apps/todo-app
            # Create .env file from GitHub secrets using echo
            echo "MONGO_ROOT_USERNAME=${{ secrets.MONGO_ROOT_USERNAME }}" > .env
            echo "MONGO_ROOT_PASSWORD=${{ secrets.MONGO_ROOT_PASSWORD }}" >> .env
            echo "NODE_ENV=production" >> .env
            echo "UV_THREADPOOL_SIZE=4" >> .env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
            docker network ls | grep -q todo-app_traefik-net || docker network create todo-app_traefik-net
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:latest
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:latest
            docker-compose -f docker-compose.yml up -d --build
          EOF

  health-check:
    needs: deploy
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Wait for service to be ready
        run: sleep 30

      - name: Health check
        run: |
          for i in 1 2 3 4 5; do
            echo "Health check attempt $i/5..."
            if curl -sf https://andreirepo.com/apps/todo; then
              echo "Health check passed!"
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1

  rollback:
    needs: health-check
    runs-on: self-hosted
    if: failure()

    steps:
      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Rollback deployment
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          echo "Health check failed! Rolling back deployment..."
          ssh ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} <<EOF
            cd /home/${{ env.SERVER_USER }}/apps/todo-app
            git checkout HEAD~1
            docker-compose -f docker-compose.yml down
            docker-compose -f docker-compose.yml up -d --build
          EOF
          echo "Rollback completed"
